      station_count: 48
      coverage_tier: "Mixed: 47 Tier 1, 1 Tier 2"
  # ... coverage varies by basin

# =============================================================================
# TEMPORAL COVERAGE BY STATION (Summary)
# Complete details in output/eda_outputs/temporal_coverage_by_station.csv
# =============================================================================
temporal_characteristics:
  data_span: "2020-01-06 to 2023-12-19 (4 years, 1418 days)"
  sampling_frequency_distribution:
