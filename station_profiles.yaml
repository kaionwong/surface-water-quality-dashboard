# Station Profiles for Alberta Surface Water Quality Monitoring Network
# Comprehensive metadata and characteristics for all 174 monitoring stations

version: "1.0"
dataset: "Alberta Surface Water Quality (2020-2023)"
last_updated: "2026-05-18"
total_stations: 174
coverage_classification:
  comprehensive_12plus_vars: 173
  moderate_7_12_vars: 1
  basic_3_7_vars: 0
  minimal_under_3_vars: 0

# =============================================================================
# STATION CLASSIFICATION & PRIORITIES
# =============================================================================
station_tiers:
  tier_1_comprehensive:
    criteria: "Measures 12+ variables; consistent sampling across 4 years"
    count: 173
    recommended_analyses: ["All temporal, spatial, and quality assessments"]
    
  tier_2_moderate:
    criteria: "Measures 7-12 variables; may have sampling gaps"
    count: 1
    recommended_analyses: ["Exploratory, snapshot assessments; use caution in trend analysis"]
    
  tier_3_basic:
    criteria: "Measures 3-7 variables; limited historical data"
    count: 0
    
  tier_4_minimal:
    criteria: "Measures <3 variables; sparse sampling"
    count: 0

