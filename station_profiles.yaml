# =============================================================================
# STATION GROUPING FOR COMPARATIVE ANALYSIS
# =============================================================================
analytical_groupings:
  by_basin:
    description: "Compare water quality within and across basins"
    use_case: "Spatial assessment, inter-basin comparisons"
    note: "Unequal sample sizes per basin; account in statistical models"
  
  by_upstream_downstream:
    description: "Assess impact of confluence, inflow, or land use change"
    requires: "Manual assignment based on GIS analysis"
    data_readiness: "Not yet implemented; recommend in Phase 3"
  
  by_parameter_coverage:
    description: "Group stations by measured parameters for multi-variable analyses"
    tier_1_comprehensive: "Use for all analyses"
    tier_2_moderate: "Subset by available parameters"
  
  by_temporal_pattern:
    description: "Group stations with similar sampling frequency"
    monthly_sampled: ["165 stations - use for trend analysis"]
    sparse_sampled: ["8 stations - use for snapshots"]

# =============================================================================
# QUALITY METRICS BY STATION (Summary)
# Full metrics in output/eda_outputs/quality_summary_by_station.csv
# =============================================================================
quality_summary:
  overall_compliance:
    stations_100_percent_compliant: 145  # Pass all S1-C2 rules
    stations_95_percent_plus: 165        # High quality
    stations_below_95_percent: 9         # Flag for review (mostly S1 violations)
    
  common_issues_by_station:
    s1_vmv_unit_inconsistency:
      stations_affected: 4
      description: "4 stations affected by VmvCode 6107 dual units (ug/L + mg/L)"
      mitigation: "Apply unit conversion per unit_definitions.yaml"
    
    m2_out_of_range_values:
      stations_affected: 3
      total_records_flagged: 596
      examples: "Likely data entry or instrument errors"
      action: "Review and flag for manual verification"

# =============================================================================
# STATION SELECTION CRITERIA FOR SPECIFIC ANALYSES
# =============================================================================
selection_criteria:
  temporal_trend_analysis:
    minimum_years: 3
    minimum_samples_per_year: 3
    maximum_gap_tolerance_days: 120
    stations_qualifying: 164  # Out of 174
    excluded_stations: 10
    exclusion_reason: "Insufficient samples in one or more years"
  
  cross_sectional_comparison:
    minimum_stations: 2
    parameter_requirement: "Same variable at multiple stations"
    time_window: "Single year or season"
    stations_available: 174  # All qualify
  
  basin_health_assessment:
    minimum_stations_per_basin: 3
    time_aggregation: "Annual or multi-year average"
    parameter_suite: "Core variables (pH, DO, Temp, nutrients)"
    basins_qualifying: "All 8 major basins"

# =============================================================================
# DATA STEWARDSHIP & STATION MAINTENANCE
# =============================================================================
metadata_recommendations:
  missing_information:
    - elevation_meters
    - river_km_from_mouth
    - upstream_catchment_area_km2
    - reach_type_classification
    - land_use_percentage_per_category
    - sampling_protocol_version
  
  suggested_enhancements:
    - add_flow_rate_measurements
    - add_upstream_discharge_gauge_link
    - document_station_history_repairs_relocations
    - add_ecological_region_classification

quality_stewardship:
  current_state: "Excellent (98.18% compliance with 12 rules)"
  maintenance_protocol: "Continue current practices"
  recommended_frequency: "Quarterly compliance audits"
  stakeholder_communication: "Publish annual quality report per basin"

