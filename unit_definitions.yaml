# Unit Definitions for Alberta Surface Water Quality Variables
# Maps all measured parameters to canonical units, methods, and conversion factors

version: "1.0"
dataset: "Alberta Surface Water Quality (2020-2023)"
last_updated: "2026-05-18"
total_vmv_codes: 91
consistent_codes: 90
inconsistent_codes: 1

# =============================================================================
# UNIT STANDARDIZATION RULES
# =============================================================================
standardization:
  approach: "Canonical Unit Strategy"
  philosophy: "One canonical unit per variable; conversions applied automatically"
  canonical_units:
    "Nutrient Parameters":
      unit: "mg/L"
      rationale: "Standard reporting unit for aquatic environments"
    "Trace Elements":
      unit: "ug/L"
      rationale: "Standard for low-concentration substances"
    "pH":
      unit: "pH units"
      rationale: "Logarithmic scale, no conversion"
    "Temperature":
      unit: "Celsius"
      rationale: "Alberta standard; Fahrenheit converted as-needed"
    "Dissolved Gases":
      unit: "mg/L"
      rationale: "Aquatic standard"
    "Physical Properties":
      unit: "Mixed (NTU, µS/cm, °C)"
      rationale: "Parameter-specific standard"

conversions:
  mg_L_to_ug_L:
    formula: "ug/L = mg/L × 1000"
    inverse: "mg/L = ug/L ÷ 1000"
    verification: "Ensure converted value falls within expected parameter range"

  fahrenheit_to_celsius:
    formula: "°C = (°F - 32) × 5/9"
    inverse: "°F = °C × 9/5 + 32"

# =============================================================================
# KNOWN UNIT INCONSISTENCIES
# =============================================================================
inconsistencies:
  vmv_code_6107:
    status: "FLAGGED"
    variable_name: "Unknown (identified by VmvCode only)"
    units_found:
      - unit: "mg/L"
        record_count: 4474
        stations: 173
        projects: 25
        coverage: 99.6
      - unit: "ug/L"
        record_count: 16
        stations: 4
        projects: 3
        coverage: 0.4
    resolution_options:
      1:
        action: "Keep separate"
        implementation: "Analyze mg/L and ug/L as distinct measurement streams"
        pros: ["Preserves original data", "No assumptions about conversion"]
        cons: ["Reduces sample size for each stream", "Different interpretations"]
      2:
        action: "Convert to canonical (mg/L)"
        implementation: "Apply conversion: ug/L ÷ 1000 = mg/L"
        pros: ["Unified dataset", "More samples for analysis"]
        cons: ["Assumes conversion is valid", "Loses origin information"]
        validation: "Check if 16 converted values fall within expected range for this parameter"
      3:
        action: "Exclude ug/L records"
        implementation: "Use only 4,474 mg/L records (n=16 excluded)"
        pros: ["Avoids ambiguity", "Quality-first approach"]
        cons: ["Loses 16 measurements", "May bias if systematic"]
    recommended_action: "Option 2 (Convert) pending parameter identification"
    investigation_needed: "Identify variable name for VmvCode 6107 to validate conversion appropriateness"

